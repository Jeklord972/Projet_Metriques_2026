<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Atelier météo — Humidité Versailles</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f766e);
      color: white;
      min-height: 100vh;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      font-size: 18px;
      margin-bottom: 30px;
    }

    #chart {
      width: 100%;
      height: 500px;
      background: white;
      border-radius: 16px;
      padding: 15px;
      box-sizing: border-box;
    }

    #status {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Atelier météo personnalisé</h1>
    <p>Répartition de l'humidité prévue à Versailles sur les 7 prochains jours</p>

    <div id="chart"></div>
    <div id="status">Chargement des données...</div>
  </div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const response = await fetch('/atelier-data');

        if (!response.ok) {
          throw new Error("Erreur HTTP " + response.status);
        }

        const json = await response.json();

        if (json.error) {
          throw new Error(json.error);
        }

        const rows = [
          ['Catégorie', 'Nombre de mesures']
        ];

        json.forEach(item => {
          rows.push([item.categorie, Number(item.valeur)]);
        });

        const data = google.visualization.arrayToDataTable(rows);

        const options = {
          title: "Répartition de l'humidité à Versailles",
          pieHole: 0.4,
          legend: {
            position: 'bottom'
          },
          chartArea: {
            width: '90%',
            height: '75%'
          }
        };

        const chart = new google.visualization.PieChart(document.getElementById('chart'));
        chart.draw(data, options);

        document.getElementById('status').textContent =
          "OK — données chargées depuis /atelier-data";

      } catch (error) {
        document.getElementById('status').textContent =
          "Erreur : " + error.message;
        console.error(error);
      }
    }
  </script>
</body>
</html>
