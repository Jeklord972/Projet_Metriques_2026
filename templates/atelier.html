<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Atelier — Humidité Versailles</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f766e);
      color: white;
      min-height: 100vh;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    p {
      text-align: center;
      font-size: 18px;
    }

    #chart {
      width: 100%;
      height: 420px;
      display: flex;
      justify-content: center;
    }

    #status {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tableau de bord météo</h1>
    <p>Indicateur personnalisé : humidité prévue à Versailles</p>

    <div id="chart"></div>
    <div id="status"></div>
  </div>

  <script>
    google.charts.load('current', { packages: ['gauge'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      const res = await fetch('/atelier-data');
      const json = await res.json();

      const rows = [['Heure', 'Humidité']];

      json.forEach(p => {
        const hour = p.datetime.split('T')[1];
        rows.push([hour, Number(p.humidity)]);
      });

      const data = google.visualization.arrayToDataTable(rows);

      const options = {
        width: 900,
        height: 400,
        redFrom: 80,
        redTo: 100,
        yellowFrom: 60,
        yellowTo: 80,
        greenFrom: 30,
        greenTo: 60,
        minorTicks: 5,
        max: 100
      };

      const chart = new google.visualization.Gauge(document.getElementById('chart'));
      chart.draw(data, options);

      document.getElementById('status').textContent = "Données chargées depuis /atelier-data";
    }
  </script>
</body>
</html>
