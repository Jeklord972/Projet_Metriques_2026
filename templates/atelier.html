<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Atelier — Humidité Versailles</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f766e);
      color: white;
      min-height: 100vh;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1, p {
      text-align: center;
    }

    #chart {
      width: 100%;
      height: 450px;
      margin-top: 30px;
    }

    #status {
      text-align: center;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Atelier météo personnalisé</h1>
    <p>Indicateur : humidité prévue à Versailles</p>

    <div id="chart"></div>
    <div id="status">Chargement des données...</div>
  </div>

  <script>
    google.charts.load('current', { packages: ['gauge'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const response = await fetch('/atelier-data');

        if (!response.ok) {
          throw new Error("Erreur HTTP " + response.status);
        }

        const json = await response.json();

        if (!json.length) {
          throw new Error("Aucune donnée reçue depuis /atelier-data");
        }

        const rows = [['Heure', 'Humidité']];

        json.forEach(item => {
          const heure = item.datetime.split('T')[1];
          const humidite = Number(item.humidity);

          if (!isNaN(humidite)) {
            rows.push([heure, humidite]);
          }
        });

        const data = google.visualization.arrayToDataTable(rows);

        const options = {
          width: 900,
          height: 400,
          min: 0,
          max: 100,
          greenFrom: 30,
          greenTo: 60,
          yellowFrom: 60,
          yellowTo: 80,
          redFrom: 80,
          redTo: 100,
          minorTicks: 5
        };

        const chart = new google.visualization.Gauge(document.getElementById('chart'));
        chart.draw(data, options);

        document.getElementById('status').textContent =
          "OK — " + (rows.length - 1) + " mesures d'humidité chargées depuis /atelier-data";

      } catch (error) {
        document.getElementById('status').textContent = "Erreur : " + error.message;
        console.error(error);
      }
    }
  </script>
</body>
</html>
