
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Contact</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.12);
      padding: 35px;
      border-radius: 18px;
      width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    textarea {
      height: 120px;
      resize: none;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Contact</h1>
    <p>Vous pouvez laisser votre nom, prénom et message.</p>

    <form>
      <label>Nom</label>
      <input type="text" placeholder="Votre nom">

      <label>Prénom</label>
      <input type="text" placeholder="Votre prénom">

      <label>Message</label>
      <textarea placeholder="Votre message"></textarea>

      <button type="button">Envoyer</button>
    </form>
  </div>
</body>
</html>
