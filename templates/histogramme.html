<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Histogramme météo Paris</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f1f5f9;
    }

    h1 {
      color: #0f172a;
    }

    #chart {
      width: 100%;
      height: 520px;
      background: white;
      border-radius: 12px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Température moyenne par jour — Paris</h1>
  <div id="chart"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      const res = await fetch('/paris');
      const json = await res.json();

      const groups = {};

      json.forEach(p => {
        const date = p.datetime.split('T')[0];
        const temp = Number(p.temperature_c);

        if (!groups[date]) {
          groups[date] = [];
        }

        groups[date].push(temp);
      });

      const rows = [['Date', 'Température moyenne °C']];

      Object.keys(groups).forEach(date => {
        const values = groups[date];
        const average = values.reduce((a, b) => a + b, 0) / values.length;
        rows.push([date, Number(average.toFixed(2))]);
      });

      const data = google.visualization.arrayToDataTable(rows);

      const options = {
        title: 'Prévisions météo Paris sur 7 jours',
        legend: { position: 'none' },
        hAxis: { title: 'Date' },
        vAxis: { title: 'Température moyenne °C' }
      };

      const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
      chart.draw(data, options);
    }
  </script>
</body>
</html>
